<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feuerwehr Barkhausen - Infoscreen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        :root {
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --text-main: #333333;
            --header-bg: #ffffff;
            --border-color: #e0e0e0;
            --accent-color: #012796;
        }

        /* Darkmode Definitionen */
        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --header-bg: #1e1e1e;
            --border-color: #333333;
        }

        @media (prefers-color-scheme: dark) {
            [data-theme="system"] {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #e0e0e0;
                --header-bg: #1e1e1e;
                --border-color: #333333;
            }
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        .header-container {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: var(--header-bg); border-bottom: 2px solid var(--border-color);
            height: 90px; flex-shrink: 0; z-index: 100;
        }
        .header-left img { height: 70px; cursor: pointer; transition: 0.2s; }
        .header-center { font-size: 20px; color: #B40404; font-weight: bold; text-align: center; flex-grow: 1; }
        
        /* MENU & SIDEBAR */
        .menu-trigger { font-size: 30px; cursor: pointer; padding: 10px; color: var(--accent-color); }
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: var(--header-bg); box-shadow: -2px 0 10px rgba(0,0,0,0.3);
            transition: 0.3s; z-index: 1000; padding: 20px;
        }
        .sidebar.open { right: 0; }
        .sidebar h3 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .theme-btn {
            width: 100%; padding: 12px; margin: 5px 0; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-main); border-radius: 6px; cursor: pointer;
        }
        .theme-btn.active { border-color: #B40404; font-weight: bold; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }

        /* CONTENT */
        .content-container { display: flex; flex-grow: 1; padding: 20px; gap: 20px; overflow: hidden; touch-action: pan-y; }
        .content-box { background: var(--card-bg); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .highlight-row { background: rgba(255, 214, 0, 0.15) !important; border-left: 5px solid #FFD600; }

        /* MOBILE NAVIGATION */
        .mobile-nav { display: none; height: 65px; background: var(--header-bg); border-top: 1px solid var(--border-color); justify-content: space-around; align-items: center; }
        .nav-item { flex: 1; text-align: center; color: #888; cursor: pointer; font-size: 0.9rem; }
        .nav-item.active { color: #B40404; font-weight: bold; }

        @media (max-width: 800px) {
            .header-container { height: 65px; }
            .header-left img { height: 45px; }
            .header-right { display: none; }
            .mobile-nav { display: flex; }
            .content-box { display: none; }
            .active-tab { display: flex !important; }
        }
    </style>
</head>
<body data-theme="system">

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <div id="sidebar" class="sidebar">
        <h3>Einstellungen</h3>
        <p>Design wählen:</p>
        <button class="theme-btn" id="btn-light" onclick="setTheme('light')">☀️ Hell</button>
        <button class="theme-btn" id="btn-dark" onclick="setTheme('dark')">🌙 Dunkel</button>
        <button class="theme-btn" id="btn-system" onclick="setTheme('system')">🖥️ System</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border-color);">
        <button class="theme-btn" onclick="toggleMenu()">Schließen</button>
    </div>

    <div class="header-container">
        <div class="header-left"><img src="Logo-redesign-LG13-removebg-preview.png" onclick="location.reload(true)"></div>
        <div class="header-center">Löschgruppenführung Barkhausen</div>
        <div class="menu-trigger" onclick="toggleMenu()">☰</div>
    </div>

    <div class="content-container" id="swipeArea">
        <div id="tab-news" class="content-box active-tab">
            <h2>📢 Aktuelles</h2>
            <div id="news-container" style="overflow-y:auto;">Lade...</div>
        </div>
        <div id="tab-dienst" class="content-box">
            <h2>📅 Dienstplan</h2>
            <div id="dienst-container" style="overflow-y:auto;">Lade...</div>
        </div>
    </div>

    <div class="mobile-nav">
        <div class="nav-item active" id="m-news" onclick="showTab('news')">📢 News</div>
        <div id="m-dienst" class="nav-item" onclick="showTab('dienst')">📅 Dienstplan</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby4cqLuPsVEGN_r0xSapBs_yM1syrGI45WkDBLLINPuwHiJcLZBal0_mdQMEQl9-OsG/exec";

        // THEME LOGIC
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('selected-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + theme).classList.add('active');
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').style.display = 
                document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
        }

        // NAVIGATION
        function showTab(tab) {
            document.getElementById('tab-news').classList.toggle('active-tab', tab === 'news');
            document.getElementById('tab-dienst').classList.toggle('active-tab', tab === 'dienst');
            document.getElementById('m-news').classList.toggle('active', tab === 'news');
            document.getElementById('m-dienst').classList.toggle('active', tab === 'dienst');
            if(tab === 'dienst') {
                setTimeout(() => {
                    const next = document.getElementById('next-row');
                    if(next) next.scrollIntoView({behavior: 'smooth', block: 'start'});
                }, 150);
            }
        }

        // SWIPE
        let startX = 0;
        document.getElementById('swipeArea').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('swipeArea').addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if(Math.abs(diff) > 60) showTab(diff > 0 ? 'dienst' : 'news');
        });

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                renderNews(data.news);
                renderDienst(data.dienste);
            } catch (e) { console.error("API Fehler"); }
        }

        function renderNews(news) {
            document.getElementById('news-container').innerHTML = news.map(n => `
                <div style="border-left:5px solid #5cb85c; padding:15px; background:var(--card-bg); margin-bottom:15px; border-radius:4px;">
                    ${n.bild ? `<img src="${n.bild}" style="width:100%; border-radius:8px; margin-bottom:10px;">` : ''}
                    <h3 style="margin:0;">${n.titel}</h3>
                    <p>${n.inhalt}</p>
                </div>
            `).join('');
        }

        function renderDienst(dienste) {
            const heute = new Date(); heute.setHours(0,0,0,0);
            let nextId = false;
            let html = `<table style="width:100%; border-collapse:collapse;">`;
            dienste.forEach(d => {
                let dObj = new Date(d.datum);
                let isNext = (!nextId && dObj >= heute);
                if(isNext) nextId = true;
                let date = d.datum.includes('T') ? dObj.toLocaleDateString('de-DE') : d.datum;
                html += `<tr ${isNext ? 'id="next-row" class="highlight-row"' : ''} style="border-bottom:1px solid var(--border-color);">
                    <td style="padding:15px; text-align:center; border-right:1px solid var(--border-color);">
                        <span style="color:#B40404; font-weight:bold;">${date}</span>
                    </td>
                    <td style="padding:15px;">
                        <strong>${d.thema}</strong><br>
                        <small>👕 ${d.kleidung} | 👤 ${d.leitung}</small>
                    </td>
                </tr>`;
            });
            document.getElementById('dienst-container').innerHTML = html + "</table>";
            if(window.innerWidth > 800) showTab('news'); // Kiosk Modus Fix
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('selected-theme') || 'system';
            setTheme(savedTheme);
            loadData();
            if(window.innerWidth <= 800) document.getElementById('tab-dienst').classList.remove('active-tab');
        };
    </script>
</body>
</html>
